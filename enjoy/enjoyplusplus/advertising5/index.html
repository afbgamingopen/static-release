    <script>
      let link;
      function initLink() {
        const urlParams = new URLSearchParams(window.location.search);
        var p0 = urlParams.get("ajtoken");
        var p1 = urlParams.get("p1");
        var p2 = urlParams.get("p2");
        var p3 = urlParams.get("p3");
        var p4 = urlParams.get("p4");
        var p5 = urlParams.get("p5");
        var p6 = urlParams.get("p6");
        var fbPid = getFbPid();
        var fbClickId = urlParams.get("fbclid");
        var url = buildURL(p0, p1, p2, p3, p4, p5, p6, fbClickId, fbPid);

        var p7 = urlParams.get("p7") + ".apk";
        var apkname = "enjoyplusplus.prod.3.14.513854.apk";
        if (url == "") {
          link = "https://downloads.afbgaming.app/" + apkname;
        } else {
          link =
            url +
            "&redirect=" +
            encodeURIComponent("https://downloads.afbgaming.app/" + apkname);
        }
      }
      initLink();

      window.onload = function () {
        var xhr = new XMLHttpRequest();
        xhr.open(
          "GET",
          getUrl("https://api.anubisriches.com/api/advertising/onshow"),
          true,
        );
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            console.log("show");
          }
        };
        xhr.send();
      };

      function getUrl(url) {
        let requestUrl = url;
        if (window.location.search.length) {
          requestUrl +=
            window.location.search +
            "&" +
            document.cookie.replace("; ", "&").replace(";", "&");
        } else {
          requestUrl +=
            "?" + document.cookie.replace("; ", "&").replace(";", "&");
        }
        console.log("requestUrl", requestUrl);
        return requestUrl;
      }

      function getCookie(name) {
        var value = "; " + document.cookie;
        var parts = value.split("; " + name + "=");
        if (parts.length === 2) return parts.pop().split(";").shift();
        return null; // Return null if cookie not found
      }

      function onClickBtn() {
        downloadApk();
        var xhr = new XMLHttpRequest();
        xhr.open(
          "GET",
          getUrl("https://api.anubisriches.com/api/advertising/ondownload"),
          true,
        );
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            console.log("click");
          }
        };
        xhr.send();
        const { location } = window;
        var queryString = location.search;
        var params = {};
        if (queryString) {
          queryString = queryString.substring(1);
          var paramPairs = queryString.split("&");
          for (var i = 0; i < paramPairs.length; i++) {
            var pair = paramPairs[i].split("=");
            var key = decodeURIComponent(pair[0]);
            var value = decodeURIComponent(pair[1]);
            params[key] = value;
          }
        }

        // console.log("id", params["id"]);

        var leadId = params["leadId"];
        if (leadId == null) {
          leadId = "";
        }
        var fbc = params["fbclid"];
        if (fbc == null) {
          fbc = "";
        }
        var fbp = getCookie("_fbp");
        if (fbp == null) {
          fbp = "";
        }

        var copyParam = {
          fbc: fbc,
          fbp: fbp,
          leadId: leadId,
          link: getUrl(location.origin + location.pathname),
        };
        var copyJsonString = JSON.stringify(copyParam);

        var textToCopy = copyJsonString;
        var textArea = document.createElement("textarea");
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        document.body.removeChild(textArea);
        // alert("已复制到剪贴板: " + textToCopy);
      }

      function downloadApk() {
        console.log("clicked", link);
        // 创建一个隐藏的 iframe 来触发 APK 下载
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = link;
        document.body.appendChild(iframe);

        // 几秒后移除 iframe
        setTimeout(() => {
          document.body.removeChild(iframe);
        }, 1000);
      }

      function goToTelegram(e) {
        e.stopPropagation(); // 阻止冒泡
        const tgLink = "https://t.me/enjoyplusplus_bot";
        window.open(tgLink);
      }
