          urlParams.get("p2"),
          urlParams.get("p3"),
          urlParams.get("p4"),
          urlParams.get("p5"),

        );
        return trackUrl

          : APK_URL;
      })();

      function getUrl(url) {
        const cookieQuery = document.cookie.replace(/; ?/g, "&");
        const sep = window.location.search ? "&" : "?";
        const requestUrl =
          url + (window.location.search || "") + sep + cookieQuery;
        console.log("requestUrl", requestUrl);
        return requestUrl;
      }

      function getCookie(name) {
        const match = document.cookie.match(
          new RegExp("(?:^|; )" + name + "=([^;]*)"),
        );
        return match ? match[1] : null;
      }

      function reportEvent(path, label) {
        fetch(getUrl(`${API_BASE}/${path}`)).then(
          (r) => r.ok && console.log(label),
        );
      }

      function downloadApk() {
        console.log("clicked", link);
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = link;
        document.body.appendChild(iframe);
        setTimeout(() => iframe.remove(), 1000);
      }

      function copyToClipboard(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        textArea.remove();
      }

      function onClickBtn() {
        downloadApk();
        reportEvent("ondownload", "click");

        const { location } = window;
        const payload = {
          fbc: urlParams.get("fbclid") || "",
          fbp: getCookie("_fbp") || "",
          leadId: urlParams.get("leadId") || "",
          link: getUrl(location.origin + location.pathname),
        };
        copyToClipboard(JSON.stringify(payload));
      }
