    <script>
      const APK_URL =
        "https://downloads.afbgaming.app/goldnile.prod.1.2.551686.apk";
      const API_BASE = "https://api.anubisriches.com/api/advertising";
      const urlParams = new URLSearchParams(window.location.search);

      const link = (() => {
        const trackUrl = buildURL(
          urlParams.get("ajtoken"),
          urlParams.get("p1"),
          urlParams.get("p2"),
          urlParams.get("p3"),
          urlParams.get("p4"),
          urlParams.get("p5"),
          urlParams.get("p6"),
          urlParams.get("fbclid"),
          getFbPid()
        );
        return trackUrl
          ? trackUrl + "&redirect=" + encodeURIComponent(APK_URL)
          : APK_URL;
      })();

      function getUrl(url) {
        const cookieParams = document.cookie.replaceAll("; ", "&").replaceAll(";", "&");
        const search = window.location.search;
        const separator = search.length ? "&" : "?";
        return url + search + separator + cookieParams;
      }

      function getCookie(name) {
        const match = document.cookie.match(
          new RegExp("(?:^|; )" + name + "=([^;]*)")
        );
        return match ? match[1] : null;
      }

      function reportEvent(path, label) {
        fetch(getUrl(`${API_BASE}/${path}`)).then(
          (r) => r.ok && console.log(label)
        );
      }

      function downloadApk() {
        console.log("clicked", link);
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = link;
        document.body.appendChild(iframe);
        setTimeout(() => iframe.remove(), 1000);
      }

      function onClickBtn() {
        downloadApk();
        reportEvent("ondownload", "click");
        const { location } = window;
        const payload = {
          fbc: urlParams.get("fbclid") || "",
          fbp: getCookie("_fbp") || "",
          leadId: urlParams.get("leadId") || "",
          link: getUrl(location.origin + location.pathname),
        };
        const textArea = document.createElement("textarea");
        textArea.value = JSON.stringify(payload);
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        textArea.remove();
      }

      window.onload = () => reportEvent("onshow", "show");
    </script>
