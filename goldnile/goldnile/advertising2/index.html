    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const APK_NAME = "goldnile.prod.1.2.169907.apk";
      const APK_BASE = "https://downloads.afbgaming.app/";
      const API_BASE = "https://api.anubisriches.com/api/advertising";
      let link;

      function initLink() {
        const p0 = urlParams.get("ajtoken");
        const p1 = urlParams.get("p1");
        const p2 = urlParams.get("p2");
        const p3 = urlParams.get("p3");
        const p4 = urlParams.get("p4");
        const p5 = urlParams.get("p5");
        const p6 = urlParams.get("p6");
        const fbPid = getFbPid();
        const fbClickId = urlParams.get("fbclid");
        const url = buildURL(p0, p1, p2, p3, p4, p5, p6, fbClickId, fbPid);
        const apkUrl = APK_BASE + APK_NAME;

        link = url === ""
          ? apkUrl
          : url + "&redirect=" + encodeURIComponent(apkUrl);
      }
      initLink();

      function getUrl(url) {
        const cookieParams = document.cookie.replaceAll("; ", "&").replaceAll(";", "&");
        const separator = window.location.search.length ? "&" : "?";
        const requestUrl = url + (window.location.search || "?") + separator + cookieParams;
        return requestUrl;
      }

      function getCookie(name) {
        const value = "; " + document.cookie;
        const parts = value.split("; " + name + "=");
        if (parts.length === 2) return parts.pop().split(";").shift();
        return null;
      }

      function sendTrack(endpoint) {
        fetch(getUrl(API_BASE + endpoint)).catch(() => {});
      }

      window.onload = function () {
        sendTrack("/onshow");
      };

      function onClickBtn() {
        downloadApk();
        sendTrack("/ondownload");

        const leadId = urlParams.get("leadId") || "";
        const fbc = urlParams.get("fbclid") || "";
        const fbp = getCookie("_fbp") || "";
        const { origin, pathname } = window.location;

        const copyParam = {
          fbc,
          fbp,
          leadId,
          link: getUrl(origin + pathname),
        };

        navigator.clipboard.writeText(JSON.stringify(copyParam)).catch(() => {});
      }

      function downloadApk() {
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = link;
        document.body.appendChild(iframe);
        setTimeout(() => document.body.removeChild(iframe), 1000);
      }

      function goToTelegram(e) {
        e.stopPropagation();
        window.open("https://t.me/GoldNile_game");
      }
    </script>
