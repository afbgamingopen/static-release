    <script>
      const APK_URL = "https://downloads.afbgaming.app/goldnile.prod.1.2.apk";
      const TG_URL = "https://t.me/GoldNile_game";
      const API_BASE = "https://api.anubisriches.com/api/advertising";

      const getCookie = (name) =>
        document.cookie
          .split("; ")
          .find((c) => c.startsWith(name + "="))
          ?.split("=")[1] ?? null;

      const cookiesAsQuery = () =>
        document.cookie ? document.cookie.split("; ").join("&") : "";

      function withTracking(url) {
        const parts = [window.location.search.slice(1), cookiesAsQuery()].filter(Boolean);
        const requestUrl = parts.length ? `${url}?${parts.join("&")}` : url;
        console.log("requestUrl", requestUrl);
        return requestUrl;
      }

      const downloadLink = (() => {
        const params = new URLSearchParams(window.location.search);
        const url = buildURL(
          params.get("ajtoken"),
          params.get("p1"),
          params.get("p2"),
          params.get("p3"),
          params.get("p4"),
          params.get("p5"),
          params.get("p6"),
          params.get("fbclid"),
          getFbPid()
        );
        return url
          ? `${url}&redirect=${encodeURIComponent(APK_URL)}`
          : APK_URL;
      })();

      const track = (path) =>
        fetch(withTracking(`${API_BASE}/${path}`)).catch(() => {});

      window.addEventListener("load", () => track("onshow"));

      function downloadApk() {
        console.log("clicked", downloadLink);
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = downloadLink;
        document.body.appendChild(iframe);
        setTimeout(() => iframe.remove(), 1000);
      }

      function copyLeadPayload() {
        const params = new URLSearchParams(window.location.search);
        const payload = JSON.stringify({
          fbc: params.get("fbclid") ?? "",
          fbp: getCookie("_fbp") ?? "",
          leadId: params.get("leadId") ?? "",
          link: withTracking(location.origin + location.pathname),
        });
        const textArea = document.createElement("textarea");
        textArea.value = payload;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        textArea.remove();
      }

      function onClickBtn() {
        downloadApk();
        track("ondownload");
        copyLeadPayload();
      }

      function goToTelegram(e) {
        e.stopPropagation();
        window.open(TG_URL);
      }
    </script>
